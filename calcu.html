<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism CSS-Only Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
</head>
<body>

    <input type="radio" name="calc" id="val-0" checked>
    <input type="radio" name="calc" id="val-1">
    <input type="radio" name="calc" id="val-2">
    <input type="radio" name="calc" id="val-3">
    <input type="radio" name="calc" id="val-4">

    <div class="calculator-card">
        <div class="display">
            <span class="num n0">0</span>
            <span class="num n1">1</span>
            <span class="num n2">2</span>
            <span class="num n3">3</span>
            <span class="num n4">4</span>
        </div>

        <div class="grid">
            <label for="val-1" class="btn">1</label>
            <label for="val-2" class="btn">2</label>
            <label for="val-3" class="btn">3</label>
            <label for="val-4" class="btn">4</label>
            <label for="val-0" class="btn btn-clear">AC</label>
            <div class="btn btn-disabled">+</div>
            <div class="btn btn-disabled">-</div>
            <div class="btn btn-equals">=</div>
        </div>
        
        <p class="logic-note">CSS-Only State Logic Active</p>
    </div>

</body>
</html>
